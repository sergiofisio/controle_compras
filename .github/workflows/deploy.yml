# Deploy na VPS via SSH (Hostinger ou qualquer Linux com Git + Node + Yarn).
#
# Secrets (Settings → Secrets and variables → Actions):
#   VPS_HOST       — IP ou domínio
#   VPS_USER       — usuário SSH
#   VPS_SSH_KEY    — chave privada PEM com acesso ao servidor
# Opcional:
#   VPS_SSH_PORT   — se não existir, usa 22
#
# Variables do repositório (opcional):
#   VPS_DEPLOY_PATH — pasta do clone na VPS (default: /var/www/controle_compras)
#   VPS_PM2_NAME    — nome no PM2 (default: controle-compras)
#
# Na VPS: git clone, .env, Node/NPM e PM2:
#   pm2 start npm --name controle-compras -- start

name: Deploy VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_PATH: ${{ vars.VPS_DEPLOY_PATH || '/var/www/controle_compras' }}
      PM2_NAME: ${{ vars.VPS_PM2_NAME || 'controle-compras' }}
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || '22' }}
          envs: DEPLOY_PATH,PM2_NAME
          script_stop: true
          script: |
            set -euo pipefail
            cd "$DEPLOY_PATH"
            git fetch origin main
            git reset --hard origin/main
            npm i -g yarn@1.22.22
            yarn --version
            yarn install --frozen-lockfile
            yarn build
            if command -v pm2 >/dev/null 2>&1; then
              pm2 reload "$PM2_NAME" --update-env || pm2 start npm --name "$PM2_NAME" -- start
            else
              echo "Instale PM2 (npm i -g pm2) ou altere o script para systemd/Docker." >&2
              exit 1
            fi
